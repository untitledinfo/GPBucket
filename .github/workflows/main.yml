name: Build GPBucketBypass

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Plugin
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew build --no-daemon
          else
            gradle build --no-daemon
          fi

      - name: Upload Plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: GPBucketBypass
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # A version tag such as v1.0.0 automatically creates the release. Normal
    # branch and pull-request builds remain artifact-only.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download built plugin
        uses: actions/download-artifact@v4
        with:
          name: GPBucketBypass
          path: release

      - name: Create release and attach plugin JAR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release/*.jar \
            --title "GPBucketBypass $TAG_NAME" \
            --generate-notes
