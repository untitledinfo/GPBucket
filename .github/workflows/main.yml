name: Build GPBucketBypass

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Plugin
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew build --no-daemon
          else
            gradle build --no-daemon
          fi

      - name: Upload Plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: GPBucketBypass
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # Version tags (v1.0.0) publish a named release. Regular pushes to
    # main/master publish a rolling "latest-build" pre-release so the jar
    # is always downloadable without having to cut a version tag first.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      # gh release uses the repository's local Git metadata to resolve the
      # release target, so this job needs a checkout as well as the artifact.
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built plugin
        uses: actions/download-artifact@v4
        with:
          name: GPBucketBypass
          path: release

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "title=GPBucketBypass ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest-build" >> "$GITHUB_OUTPUT"
            echo "title=GPBucketBypass latest build ($(echo ${GITHUB_SHA} | cut -c1-7))" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release and attach plugin JAR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag }}"
          # The rolling "latest-build" tag is reused every push, so delete
          # any previous release/tag under that name before recreating it.
          if [ "$TAG_NAME" = "latest-build" ]; then
            gh release delete "$TAG_NAME" --yes --cleanup-tag || true
          fi
          PRERELEASE_FLAG=""
          if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" release/*.jar \
            --title "${{ steps.tag.outputs.title }}" \
            --target "${{ github.sha }}" \
            $PRERELEASE_FLAG \
            --generate-notes
