# =====================================================================
#  GPBucketBypass configuration
# =====================================================================
#  Blocks lava and water bucket use. Defaults protect everyone in
#  GriefPrevention claims, including trusted players, claim owners, and
#  administrators unless they have gpbucket.exempt or a database exemption.
#
#  debug:
#    When true, verbose bypass decisions are logged to console.
#
#  protection-scope: CLAIMS blocks only inside any GP claim; EVERYWHERE
#    blocks across listed worlds, including wilderness.
#  exemptions: permission and/or database exemptions can be disabled.
# =====================================================================

# Bumped automatically by the plugin when defaults change; do not edit
# unless told to. Used to trigger a one-time config backup on upgrade.
config-version: 3

debug: false
database-file: data.db
protection-scope: CLAIMS
# Named regions created with /gpbucket region create <name> are protected in
# addition to GriefPrevention claims. Select two points using the WorldEdit
# wooden axe, then run the command.
worldedit-regions-enabled: true

# Console branding and operational logging. ANSI color works in most modern
# terminals; disable it if your hosting panel shows raw escape characters.
console:
  startup-banner: true
  big-logo: true
  ansi-colors: true
  log-admin-commands: true
  log-protection-summary: true
  log-load-stages: true

block-water: true
block-lava: true
block-fill: true
block-empty: true
# Prevent existing lava/water from flowing into protected land.  This is
# independent from bucket blocking and is useful against liquid griefing.
block-fluid-flow: true
# Prevent dispensers from placing lava/water buckets in protected land.
block-dispensers: true
# Block bucket actions even in creative mode (recommended for staff-safe servers).
block-creative-mode: true
# Cooldown between a player's allowed liquid bucket actions; 0 disables it.
bucket-cooldown-ms: 0

respect-permission-exemptions: true
respect-database-exemptions: true
log-blocked-actions: true
notify-player: true
notify-staff: false
staff-notification-permission: gpbucket.notify
# Extra player feedback for blocked liquid actions.
blocked-actionbar: true
blocked-sound: true

# Messages can be customized with & color codes.
messages:
  blocked: '&cLava and water buckets are disabled in this protected area.'
  cooldown: '&ePlease wait before using another liquid bucket.'
  gui-updated: '&aSetting updated.'
  inspection-header: '&b&lGPBucket Protection Inspection'
  no-audit-history: '&7No blocked liquid actions are recorded for this player.'
  no-permission: '&cYou do not have permission to do that.'
  player-not-found: '&cThat player must be online.'
  rule-updated: '&aRule for &f%player% &ais now &e%rule%&a.'
  combat-tag: '&cYou cannot use liquid buckets while in combat.'
  auto-blocked: '&cYou have been temporarily blocked for repeated violations.'

worlds:
  - world
  - world_nether
  - world_the_end

# =====================================================================
#  HUGE UPDATE — 25 new features
# =====================================================================

# 1) Stop fire spreading onto/into protected land (torch drops, lava
#    pools, etc. igniting neighbouring blocks inside a claim/region).
block-fire-spread: true
# 2) Stop players lighting flint & steel fires on protected land.
block-flint-steel: true
# 3) Stop cauldrons being filled/emptied with buckets on protected land.
block-cauldron: true
# 4) Treat powder snow buckets the same as water/lava buckets.
block-powder-snow: true

# 5) Combat-tag lockout: players who took/dealt damage in the last N
#    seconds cannot use a liquid bucket at all (stops "bucket clutch"
#    escapes and lava-dropping on an opponent's claim). 0 disables it.
combat-tag-seconds: 0

# 6) Per-world scope overrides. Anything listed here replaces the global
#    protection-scope for that world only, e.g. force the nether to be
#    protected EVERYWHERE while overworld only protects CLAIMS.
worlds-scope-override: {}
#  worlds-scope-override:
#    world_nether: EVERYWHERE

# 7) Minimum time between repeated "blocked" chat messages/action bars
#    to the same player, so spam-clicking a claim border doesn't flood
#    their chat. 0 disables the cooldown.
message-cooldown-ms: 1500

# 8) Discord webhook alerts whenever a liquid action is blocked.
webhook:
  enabled: false
  url: ''

# 9) PlaceholderAPI support (soft-depend). Exposes %gpbucket_blocked_count%,
#    %gpbucket_rule%, and %gpbucket_protected%. No config needed — it is
#    auto-registered if PlaceholderAPI is installed.

# 10) Auto-block: temporarily force-block a player after too many
#     blocked attempts in a short window (likely a griefer probing claims).
auto-block:
  enabled: true
  threshold: 6
  window-seconds: 30
  duration-minutes: 10

# 11) Checks GitHub for newer releases on startup and notifies staff
#     with gpbucket.notify on join if one is available.
update-checker:
  enabled: true
  repo: untitledinfo/GPBucket

# 12) Audit log retention: automatically purge blocked-action rows
#     older than this many days. 0 keeps everything forever.
audit-retention-days: 90

# 17) Cooldown between a single player's /gpbucket region create calls.
region-create-cooldown-ms: 5000

# 18) Show a one-time reminder to players the first time they stand on
#     protected land after joining.
join-tutorial-message: true

# 21) Distinct notification sound for exempt (allowed) liquid use, kept
#     separate from blocked-sound above.
exempt-sound: false

# =====================================================================
#  ADVANCED UPDATE — 25 more new features (76-100)
# =====================================================================

# 76) Overlapping protected regions resolve using /gpbucket region priority
#     <name> <n> — the highest-priority region's flags win. No config key;
#     priority is stored per-region in the database.

# 77) Per-region liquid flag overrides via
#     /gpbucket region flag <name> <water|lava|powder_snow> <allow|deny|default>.
#     No config key; stored per-region in the database.

# 78) Timed player rules: /gpbucket exempt|block <player> [minutes]. Omit
#     the duration for a permanent rule, same as before.

# 79) /gpbucket whois <player> — unified dashboard (rule, blocked count,
#     risk score, auto-block state, last 3 audit entries).

# 80) /gpbucket panic — instant global lockdown toggle. Runtime-only,
#     always resets to off on restart, never written to this file.

# 81) /gpbucket simulate — per-admin dry-run mode: your own liquid
#     actions still succeed, but you see exactly what would be blocked.

# 82) Protection schedule: when enabled, protection is only active
#     between start-hour and end-hour (server-local time, 24h, wraps
#     past midnight if end < start).
schedule:
  enabled: false
  start-hour: 0
  end-hour: 24

# 83) Notify the claim owner (if online) when someone is blocked
#     attempting to grief their claim.
claim-owner-notify: true

# 84) Broadcast to the whole server when total blocked actions cross
#     one of these milestones.
milestones:
  - 100
  - 500
  - 1000
  - 5000
  - 10000

# 85) Public developer API (GPBucketAPI) + BucketBlockedEvent for other
#     plugins to hook into. No config needed.

# 86) Locale/message-pack override. Set to anything other than "en" and
#     drop a messages_<locale>.yml (with a "messages:" section, same
#     keys as above) into the plugin's data folder to override text.
locale: en

# 87) /gpbucket audit search <keyword> — search the global audit log by
#     player name, action, or world.

# 88) /gpbucket forgive <player> — clears a player's active auto-block
#     and resets their offense window.

# 89) /gpbucket region export [file] / import <file> — YAML snapshot of
#     every region, including flags and priority.

# 90) /gpbucket region show <name> — outlines a region with particles,
#     visible only to you, for 8 seconds.

# 91) /gpbucket bypasscode generate / redeem <code> — one-time-use
#     staff bypass codes, stored in the database.

# 92) Discord webhook alerts (feature 8) now send a rich embed instead
#     of plain text. Decimal color code, e.g. 15158332 = red.
webhook:
  embed-color: '15158332'

# 93) /gpbucket cooldown <player> — clears a player's active
#     bucket-use cooldown (see bucket-cooldown-ms above).

# 94) Background sweep clears expired timed rules (feature 78)
#     automatically every 5 minutes. No config needed.

# 95) Severity-weighted grief risk score (lava > powder snow > water),
#     surfaced in /gpbucket whois. No config needed.

# 96) /gpbucket version — verbose diagnostics: uptime, database size,
#     region/world counts, panic/schedule state, dependency status.

# 97) /gpbucket config get|set <key> [value] — live single-key editor
#     for any key in this file, without a full reload.

# 98) Worlds listed here skip the first-join protected-land tutorial
#     message (feature 18), even if join-tutorial-message is true.
join-tutorial-exclude-worlds: []

# 99) Local-only hourly health/usage summary logged to console.
#     Nothing ever leaves the server; this is not external telemetry.
metrics:
  enabled: true

# 100) Startup self-diagnostics: on enable, the console reports whether
#      GriefPrevention/WorldEdit are present and whether the data folder
#      is writable, so misconfiguration is caught immediately. Always on.

# =====================================================================
#  NEXT UPDATE — 20 more new features (101-120)
# =====================================================================

# 101) /gpbucket exempt|block <player> [minutes] [reason...] — an
#      optional free-text reason is now stored and shown in whois.

# 102) /gpbucket note <player> <text> — staff notes, shown in whois.

# 103) /gpbucket warn <player> <reason> — escalating warnings. A player
#      is automatically blocked once they reach this many warnings.
warn-threshold: 3

# 104) Region tags for grouping: /gpbucket region tag <name> <tags>,
#      /gpbucket region taglist <tag>. No config key.

# 105) /gpbucket top risk [n] — leaderboard sorted by risk score
#      instead of raw blocked-action count.

# 106) /gpbucket backup — copies the SQLite database to a timestamped
#      file in the plugin data folder. No config key.

# 107) /gpbucket region merge <a> <b> <newname> — bounding-box union of
#      two regions, replacing the originals. No config key.

# 108) New players are exempt from auto-block escalation (feature 10)
#      for this many minutes after joining this session. 0 = disabled.
grace-period-minutes: 0

# 109) Rapid-fire staff broadcasts (feature 6) are throttled to at most
#      one message per this many milliseconds, collapsing the rest into
#      a "(+N more since last alert)" summary. 0 = never throttle.
staff-alert-cooldown-ms: 0

# 110) /gpbucket testflag <player> <water|lava|powder_snow> — dry-run
#      check of whether an action would be blocked, no config needed.

# 111) Daily digest of the last 24h of blocked activity, logged to
#      console and sent to Discord if webhook.enabled is true.

# 112) /gpbucket ignore — personal opt-out from live blocked-action
#      broadcasts, without touching notify-staff for other staff.

# 113) Minimum time between repeat claim-owner-grief notifications
#      (feature 83) for the same (owner, offender) pair.
claim-owner-notify-cooldown-ms: 60000

# 114) Maximum WorldEdit regions a single player may create. 0 = no
#      limit.
max-regions-per-player: 0

# 115) /gpbucket region list [page] — paginated at 15 per page.
#      No config key.

# 116) /gpbucket audit clear — confirmed wipe of the entire audit log.
#      No config key.

# 117) Proactive action-bar warning the moment a player holding any
#      bucket crosses into protected land, before they even try to
#      use it.
proactive-warning:
  enabled: false
  message: '&e⚠ Liquid buckets are restricted in this area.'

# 118) /gpbucket rules — in-game command reference, tailored to the
#      sender's permissions. No config key.

# 119) Config validation on load: nonsensical values (negative
#      cooldowns, an empty worlds list, a zero-width auto-block
#      threshold, etc.) now log a clear console warning instead of
#      misbehaving silently. Always on.

# 120) /gpbucket audit mine — any player can check their own blocked-
#      action history, no admin permission required. No config key.
