# =====================================================================
#  GPBucketBypass configuration
# =====================================================================
#  Controls whether water/lava bucket use is allowed inside
#  GriefPrevention claims, per liquid type and per action.
#
#  debug:
#    When true, verbose bypass decisions are logged to console.
#
#  disable-water-protection / disable-lava-protection:
#    Master switches. Must be true for the corresponding fill/empty
#    options below to have any effect.
#
#  allow-water-bucket-fill / allow-lava-bucket-fill:
#    Allow picking liquid UP with an empty bucket inside a claim.
#
#  allow-water-bucket-empty / allow-lava-bucket-empty:
#    Allow placing liquid DOWN from a full bucket inside a claim.
#
#  worlds:
#    Only players in these worlds are affected. Any world not listed
#    here is left entirely to GriefPrevention's normal protection.
# =====================================================================

debug: false

disable-water-protection: true
disable-lava-protection: true

allow-water-bucket-fill: true
allow-lava-bucket-fill: true
allow-water-bucket-empty: true
allow-lava-bucket-empty: true

worlds:
  - world
  - world_nether
  - world_the_end
