name: GPBucketBypass
version: '${version}'
main: com.pgc.gpbucketbypass.Main
api-version: '1.21'
author: PGC
description: Claim-aware lava and water bucket protection with exemptions, SQLite auditing, region flags/priority, panic mode, and a public developer API.
depend: [GriefPrevention]
softdepend: [WorldEdit, PlaceholderAPI]

commands:
  gpbucket:
    description: Manage the GPBucketBypass plugin.
    usage: /<command> <gui|reload|status|report|inspect|audit|region|top|history|export|exempt|unexempt|block|unblock|stats|whois|panic|simulate|forgive|cooldown|bypasscode|config|version>

permissions:
  gpbucket.exempt:
    description: Bypasses GPBucketBypass liquid restrictions.
    default: false
  gpbucket.reload:
    description: Allows use of /gpbucket reload.
    default: op
  gpbucket.admin:
    description: Allows status and database-backed player exemption management.
    default: op
  gpbucket.gui:
    description: Allows access to the in-game GPBucketBypass administration GUI.
    default: op
  gpbucket.notify:
    description: Receives staff notifications when liquid actions are blocked.
    default: op
  gpbucket.region:
    description: Allows creating and removing protected regions from a WorldEdit selection.
    default: op
