name: GPBucketBypass
version: '${version}'
main: com.pgc.gpbucketbypass.Main
api-version: '1.21'
author: PGC
description: Claim-aware lava and water bucket protection with exemptions and SQLite auditing.
depend: [GriefPrevention]

commands:
  gpbucket:
    description: Manage the GPBucketBypass plugin.
    usage: /<command> <reload|status|exempt|unexempt>

permissions:
  gpbucket.exempt:
    description: Bypasses GPBucketBypass liquid restrictions.
    default: false
  gpbucket.reload:
    description: Allows use of /gpbucket reload.
    default: op
  gpbucket.admin:
    description: Allows status and database-backed player exemption management.
    default: op
